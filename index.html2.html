<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AmBlackKnighT · KnighTPlayzZz</title>
  <style>
    /* ----- CSS variables – dark charcoal with #3A9D5B green accent ----- */
    :root {
      --bg-primary: #1B1C1D;
      --bg-center: #151515;
      --bg-bottom: #222322;
      --bg-glass: rgba(27, 28, 29, 0.75);
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --accent: #3A9D5B;
      --accent-glow: rgba(58, 157, 91, 0.4);
      --border-glass: rgba(255, 255, 255, 0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 40%, #151515 0%, #1B1C1D 60%, #222322 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ----- glass-morphism navbar (fixed) ----- */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 999;
      background: var(--bg-glass);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border-bottom: 1px solid var(--border-glass);
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-primary);
    }
    .logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 2.2rem;
      list-style: none;
      align-items: center;
    }
    .nav-links span {
      color: var(--text-primary);
      font-weight: 500;
      font-size: 1rem;
      cursor: default;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
      background: transparent;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 28px;
      height: 3px;
      background: var(--text-primary);
      border-radius: 6px;
      transition: 0.3s;
    }

    @media (max-width: 768px) {
      .hamburger {
        display: flex;
      }
      .nav-links {
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: var(--bg-glass);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        flex-direction: column;
        padding: 1.8rem 0;
        gap: 1.5rem;
        border-top: 1px solid var(--border-glass);
        transform: scaleY(0);
        transform-origin: top;
        transition: 0.3s ease-in-out;
        opacity: 0;
        pointer-events: none;
      }
      .nav-links.active {
        transform: scaleY(1);
        opacity: 1;
        pointer-events: all;
      }
    }

    /* ----- hero section (centered) ----- */
    .hero {
      text-align: center;
      padding: 2rem;
    }
    .hero h1 {
      font-size: 5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }
    .hero h1 .highlight {
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent-glow);
    }

    .hero .sub-title {
      font-size: 1.8rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      font-weight: 300;
      letter-spacing: 2px;
    }
    .hero .sub-title span {
      color: var(--accent);
    }

    @media (max-width: 768px) {
      .hero h1 { font-size: 3rem; }
      .hero .sub-title { font-size: 1.2rem; }
    }
    @media (max-width: 480px) {
      .hero h1 { font-size: 2.2rem; }
      .hero .sub-title { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- fixed glass navbar -->
  <nav class="navbar" role="navigation">
    <div class="logo"><span>Am</span>Black<span>KnighT</span></div>
    <button class="hamburger" id="hamburger" aria-label="menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <span>Home</span>
      <span>About</span>
    </ul>
  </nav>

  <!-- ============================================================ -->
  <!--  HERO SECTION (centered)                                     -->
  <!-- ============================================================ -->
  <section class="hero">
    <h1>Am<span class="highlight">BlackKnighT</span></h1>
    <p class="sub-title">- <span>KnighTPlayzZz</span> -</p>
  </section>

  <script>
    (function() {
      "use strict";

      // ----- HAMBURGER toggle -----
      const hamburger = document.getElementById('hamburger');
      const navLinks = document.getElementById('navLinks');
      if (hamburger && navLinks) {
        hamburger.addEventListener('click', function(e) {
          e.stopPropagation();
          navLinks.classList.toggle('active');
        });
        document.addEventListener('click', function(e) {
          if (!navLinks.contains(e.target) && !hamburger.contains(e.target)) {
            navLinks.classList.remove('active');
          }
        });
      }

    })();
  </script>
</body>
</html>
