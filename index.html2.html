<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GETINTOPCPRO · Tech & Software</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ----- CSS variables – Dark mode with vibrant Green accent ----- */
    :root {
      --bg-primary: #1B1C1D;
      --bg-center: #151515;
      --bg-bottom: #222322;
      --bg-glass: rgba(27, 28, 29, 0.75);
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --accent: #2D8A4E;        
      --accent-glow: rgba(45, 138, 78, 0.4);
      --border-glass: rgba(255, 255, 255, 0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 40%, #151515 0%, #1B1C1D 60%, #222322 100%);
      background-attachment: fixed;
      display: flex;
      flex-direction: column; 
      align-items: center;
      justify-content: flex-start;
    }

    /* ----- glass-morphism navbar (fixed) ----- */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 999;
      background: var(--bg-glass);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border-bottom: 1px solid var(--border-glass);
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-primary);
    }
    .logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 2.2rem;
      list-style: none;
      align-items: center;
    }
    .nav-links span {
      color: var(--text-primary);
      font-weight: 500;
      font-size: 1rem;
      cursor: default;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
      background: transparent;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 28px;
      height: 3px;
      background: var(--text-primary);
      border-radius: 6px;
      transition: 0.3s;
    }

    @media (max-width: 768px) {
      .hamburger {
        display: flex;
      }
      .nav-links {
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: var(--bg-glass);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        flex-direction: column;
        padding: 1.8rem 0;
        gap: 1.5rem;
        border-top: 1px solid var(--border-glass);
        transform: scaleY(0);
        transform-origin: top;
        transition: 0.3s ease-in-out;
        opacity: 0;
        pointer-events: none;
      }
      .nav-links.active {
        transform: scaleY(1);
        opacity: 1;
        pointer-events: all;
      }
    }

    /* ----- MAIN WRAPPER WITH SIDEBAR LAYOUT ----- */
    .main-wrapper {
      width: 100%;
      display: flex;
      gap: 0rem;
      padding: 6rem 0rem 2rem 0rem;
      box-sizing: border-box;
      min-height: 100vh;
    }

    /* ----- MAIN CONTAINER (LEFT COLUMN) ----- */
    .main-container {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding-right: 0rem;
      padding-left: 2rem;
      max-width: calc(100% - 340px);
    }

    /* ----- RIGHT SIDEBAR FOR ADS ----- */
    .sidebar {
      width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: sticky;
      top: 100px;
      align-self: flex-start;
      max-height: calc(100vh - 120px);
      overflow-y: visible;
      padding-right: 1rem;
      padding-left: 0rem;
      margin-right: 0rem;
    }

    .sidebar .ad-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-glass);
      border-radius: 16px;
      padding: 0.8rem;
      text-align: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      overflow: hidden;
      position: relative;
    }

    .sidebar .ad-box .ad-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-secondary);
      opacity: 0.4;
      margin-bottom: 0.5rem;
    }

    .ad-container {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 250px;
      overflow: hidden;
    }

    .ad-container iframe {
      max-width: 100%;
      border: none;
    }

    /* Fallback image styles */
    .ad-fallback {
      display: none;
      width: 100%;
      margin-top: 0.5rem;
    }
    .ad-fallback img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      border: 1px solid var(--border-glass);
    }
    .ad-fallback.show {
      display: block;
    }

    /* ----- SECTION STYLES (Left aligned for results) ----- */
    .section-block {
      width: 100%;
      padding: 2rem 0; 
      background: transparent;
      transition: all 0.3s ease;
    }
    
    /* ----- CENTERED TITLE BLOCK (Matches Navbar Design) ----- */
    .center-block {
      text-align: center;
    }
    
    .main-title {
      font-size: 4.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-primary);
    }
    .main-title .highlight {
      color: var(--accent);
    }

    .sub-text {
      font-size: 1.3rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      font-weight: 300;
    }
    .sub-text strong {
      color: var(--accent);
    }

    .section-block h1 {
      font-size: 3.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .section-block h1 .highlight {
      color: var(--accent);
    }
    .section-block p {
      font-size: 1.3rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      max-width: 650px;
    }
    .section-block p strong {
      color: var(--accent);
    }
    .section-block .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 2.2rem;
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--text-primary);
      font-weight: 600;
      font-size: 1rem;
      border-radius: 50px;
      text-decoration: none;
      transition: 0.25s ease;
      cursor: pointer;
      background: rgba(58, 157, 91, 0.05);
    }
    .section-block .btn-primary {
      background: var(--accent);
      color: #0b0b0b;
      border: 2px solid var(--accent);
      font-weight: 700;
    }
    .section-block .btn-primary:hover {
      background: transparent;
      color: var(--accent);
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .section-block .btn-outline:hover {
      background: var(--accent);
      color: #0b0b0b;
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* ----- SEARCH BAR STYLES (CENTERED) ----- */
    .search-container {
      display: flex;
      justify-content: center;
      width: 100%;
      max-width: 600px;
      margin: 0 auto 3rem auto; 
    }

    .search-wrapper {
      display: flex;
      align-items: center;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      padding: 0.4rem 0.4rem 0.4rem 1.5rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .search-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow), 0 4px 20px rgba(0, 0, 0, 0.4);
      transform: scale(1.02);
    }

    .search-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 1rem;
      padding: 0.8rem 0;
      width: 100%;
    }

    .search-wrapper input::placeholder {
      color: var(--text-secondary);
      font-weight: 300;
    }

    .search-wrapper button {
      background: var(--accent);
      border: none;
      color: #0b0b0b;
      font-weight: 600;
      padding: 0.7rem 1.8rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .search-wrapper button:hover {
      background: #238b46;
      transform: scale(1.05);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    /* ----- HIDING CLASS FOR SEARCH ----- */
    .hidden-item {
      display: none !important;
    }

    /* ----- HIDE SCROLLBAR ----- */
    .sidebar::-webkit-scrollbar {
      display: none;
    }
    .sidebar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @media (max-width: 992px) {
      .sidebar {
        display: none;
      }
      .main-wrapper {
        padding: 6rem 1.5rem 2rem 1.5rem;
      }
      .main-container {
        padding-left: 0rem;
        max-width: 100%;
      }
    }

    @media (max-width: 768px) {
      .main-title { font-size: 3rem; }
      .sub-text { font-size: 1.1rem; }
      .section-block h1 { font-size: 2.8rem; }
      .section-block p { font-size: 1.1rem; }
      .search-container { max-width: 100%; }
      .search-wrapper { padding: 0.3rem 0.3rem 0.3rem 1rem; }
      .search-wrapper button { padding: 0.5rem 1.2rem; font-size: 0.85rem; }
      .main-wrapper { padding: 5rem 1rem 2rem 1rem; }
      .main-container {
        padding-left: 0rem;
        max-width: 100%;
      }
    }
    @media (max-width: 480px) {
      .main-title { font-size: 2.2rem; }
      .sub-text { font-size: 1rem; }
      .section-block h1 { font-size: 2.2rem; }
      .section-block p { font-size: 1rem; }
    }
  </style>

  <script>
    (function() {
      "use strict";

      // ----- HAMBURGER toggle -----
      const hamburger = document.getElementById('hamburger');
      const navLinks = document.getElementById('navLinks');
      if (hamburger && navLinks) {
        hamburger.addEventListener('click', function(e) {
          e.stopPropagation();
          navLinks.classList.toggle('active');
        });
        document.addEventListener('click', function(e) {
          if (!navLinks.contains(e.target) && !hamburger.contains(e.target)) {
            navLinks.classList.remove('active');
          }
        });
      }

      // ----- FALLBACK: show images if ad containers are empty after 5s -----
      setTimeout(function() {
        const containers = document.querySelectorAll('.ad-container');
        containers.forEach(function(container, index) {
          // Check if container has any child elements (script might have injected iframe or div)
          // If not, show fallback
          if (container.children.length === 0 || container.innerHTML.trim() === '') {
            const fallback = document.getElementById('fallback' + (index + 1));
            if (fallback) {
              fallback.classList.add('show');
            }
          }
        });
      }, 5000);

    })();

    // ----- WORKING INTERNAL SITE SEARCH FUNCTION -----
    function searchMySite() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      const sections = document.querySelectorAll('.section-block');

      if (query === "") {
        sections.forEach(section => {
          if(section.hasAttribute('data-search')) {
            section.classList.add('hidden-item');
          }
        });
        return;
      }

      sections.forEach(section => {
        const searchData = section.getAttribute('data-search');
        if (searchData) {
          if (searchData.toLowerCase().includes(query)) {
            section.classList.remove('hidden-item');
          } else {
            section.classList.add('hidden-item');
          }
        }
      });
    }

    document.getElementById('searchInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        searchMySite();
      }
    });
  </script>
